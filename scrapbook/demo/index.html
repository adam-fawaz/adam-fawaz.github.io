<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adam Fawaz | Scrapbook Demo</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      background-image: url("../static/background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    img {
      display: block;
      max-width: 80vw;
      max-height: 80vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }
  </style>
</head>

<body>
  <img id="ticket" src="" alt="Random ticket" />

  <script>
    const tickets = [
      "beystn280126.png",
      "gydlgw161125.png",
      "gydtas071125.png",
      "hkgpek290925.png",
      "istvko190325.png",
      "ledist300325.png",
      "lgwpvg050925.png",
      "lhrgyd061125.png",
      "lhrpvg080226.png",
      "pvgkul190925.png",
      "sdqmad020126.png",
      "tasgyd161125.png",
      "ugctas151125.png"
    ];

    const randomTicket = tickets[Math.floor(Math.random() * tickets.length)];

    document.getElementById("ticket").src = `./static/${randomTicket}`;
  </script>
</body>
</html>
